server:
  port: ${PORT:8080}

spring:
  web:
    resources:
      add-mappings: false
  data:
    mongodb:
      uri: ${MONGODB_URI}

logging:
  level:
    root: WARN
    com.mediaapp: INFO
    org.springframework.web: WARN

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  security:
    api-key: ${API_KEY:}
    require-api-key: ${REQUIRE_API_KEY:false}
  auth:
    require-auth: ${REQUIRE_AUTH:false}
    admin-username: ${ADMIN_USERNAME:}
    admin-password: ${ADMIN_PASSWORD:}
  face:
    engine: ${FACE_ENGINE:opencv}
  push:
    fcm-project-id: ${FCM_PROJECT_ID:}
    fcm-service-account-json: ${FCM_SERVICE_ACCOUNT_JSON:}
  features:
    face-ai: ${FEATURE_FACE_AI:true}
    face-library-scan: ${FEATURE_FACE_LIBRARY_SCAN:true}
    camera-capture: ${FEATURE_CAMERA_CAPTURE:true}
    camera-geotag: ${FEATURE_CAMERA_GEOTAG:true}
  discovery:
    bonjour-enabled: false
  media:
    prepare-timeout-seconds: ${PREPARE_TIMEOUT_SECONDS:120}
    yt-dlp-timeout-seconds: ${YT_DLP_TIMEOUT_SECONDS:180}
    direct-url-timeout-seconds: ${DIRECT_URL_TIMEOUT_SECONDS:35}
    search-timeout-seconds: ${SEARCH_TIMEOUT_SECONDS:45}
    prepare-max-concurrent: ${PREPARE_MAX_CONCURRENT:3}
