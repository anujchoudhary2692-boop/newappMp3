server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27019/mediaface}
  servlet:
    multipart:
      max-file-size: 120MB
      max-request-size: 120MB

app:
  storage:
    downloads-dir: ./storage/downloads
    faces-dir: ./storage/faces
    captures-dir: ./storage/captures
  face:
    models-dir: ./storage/models
    match-threshold: 0.34
    min-match-gap: 0.025
    det-score-threshold: 0.55
    det-score-sensitive: 0.32
    min-face-size-register: 64
    min-face-size-identify: 36
    min-face-size-side: 48
  media:
    yt-dlp-path: ${YT_DLP_PATH:yt-dlp}
    youtube-cookies-file: ${YOUTUBE_COOKIES_FILE:}
    youtube-cookies-base64: ${YOUTUBE_COOKIES_BASE64:}
    yt-dlp-timeout-seconds: ${YT_DLP_TIMEOUT_SECONDS:600}
    direct-url-timeout-seconds: ${DIRECT_URL_TIMEOUT_SECONDS:45}
    prepare-timeout-seconds: ${PREPARE_TIMEOUT_SECONDS:180}
    prepare-max-concurrent: ${PREPARE_MAX_CONCURRENT:4}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  security:
    api-key: ${API_KEY:}
    require-api-key: false
  features:
    media-search: ${FEATURE_MEDIA_SEARCH:true}
    media-download: ${FEATURE_MEDIA_DOWNLOAD:true}
    media-offline-cache: ${FEATURE_MEDIA_OFFLINE_CACHE:true}
    face-ai: ${FEATURE_FACE_AI:true}
    face-library-scan: ${FEATURE_FACE_LIBRARY_SCAN:true}
    camera-capture: ${FEATURE_CAMERA_CAPTURE:true}
    camera-geotag: ${FEATURE_CAMERA_GEOTAG:true}
    device-storage: ${FEATURE_DEVICE_STORAGE:true}
  discovery:
    bonjour-enabled: ${BONJOUR_ENABLED:true}
