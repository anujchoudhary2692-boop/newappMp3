server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27019/mediaface}
  servlet:
    multipart:
      max-file-size: 120MB
      max-request-size: 120MB

app:
  storage:
    downloads-dir: ./storage/downloads
    faces-dir: ./storage/faces
    captures-dir: ./storage/captures
  face:
    models-dir: ./storage/models
    match-threshold: 0.34
    min-match-gap: 0.025
    det-score-threshold: 0.55
    det-score-sensitive: 0.32
    min-face-size-register: 64
    min-face-size-identify: 36
    min-face-size-side: 48
  media:
    yt-dlp-path: ${YT_DLP_PATH:yt-dlp}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  security:
    api-key: ${API_KEY:}
    require-api-key: false
