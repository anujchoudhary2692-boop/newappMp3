# Production stack: MongoDB + MediaFace backend
# Usage:
#   cp .env.example .env   # edit secrets
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  mongodb:
    image: mongo:7
    container_name: mediaface-mongo-prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-mediaface}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
      MONGO_INITDB_DATABASE: mediaface
    volumes:
      - mediaface_mongo:/data/db
    networks:
      - mediaface
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediaface-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-mediaface}:${MONGO_ROOT_PASSWORD}@mongodb:27017/mediaface?authSource=admin
      API_KEY: ${API_KEY:?Set API_KEY in .env}
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://newappmp3.onrender.com}
      YT_DLP_PATH: yt-dlp
    volumes:
      - mediaface_storage:/app/storage
    networks:
      - mediaface
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Optional HTTPS reverse proxy — set DOMAIN in .env and point DNS to this host
  caddy:
    image: caddy:2-alpine
    container_name: mediaface-caddy
    restart: unless-stopped
    profiles:
      - https
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      API_KEY: ${API_KEY}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mediaface

volumes:
  mediaface_mongo:
  mediaface_storage:
  caddy_data:
  caddy_config:

networks:
  mediaface:
    driver: bridge
