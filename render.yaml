# Render Blueprint — https://render.com/docs/blueprint-spec
# After first deploy, confirm these dashboard secrets match mobile/web:
#   API_KEY, MONGODB_URI, YOUTUBE_COOKIES_BASE64 (optional), ADMIN_* (optional)

services:
  - type: web
    name: newappmp3
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/live
    dockerBuildArgs:
      VITE_API_KEY: c25daa68d397e64c4a7694a53d5c1f4dccfdfee444451287
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MONGODB_URI
        sync: false
      - key: API_KEY
        value: c25daa68d397e64c4a7694a53d5c1f4dccfdfee444451287
      - key: REQUIRE_API_KEY
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://newappmp3.onrender.com"
      - key: REQUIRE_AUTH
        value: "false"
      - key: JAVA_OPTS
        value: "-Xmx512m -XX:+UseG1GC"
      - key: RENDER
        value: "true"
      - key: DIRECT_URL_TIMEOUT_SECONDS
        value: "35"
      - key: SEARCH_TIMEOUT_SECONDS
        value: "45"
      - key: PREPARE_TIMEOUT_SECONDS
        value: "120"
      - key: YT_DLP_TIMEOUT_SECONDS
        value: "180"
      - key: PREPARE_MAX_CONCURRENT
        value: "3"
      - key: YOUTUBE_COOKIES_BASE64
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: JAMENDO_CLIENT_ID
        sync: false
      - key: FACE_ENGINE
        value: opencv
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
