# Render Blueprint — https://render.com/docs/blueprint-spec
# Set MONGODB_URI in the Render dashboard (MongoDB Atlas connection string).

services:
  - type: web
    name: newappmp3
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/live
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MONGODB_URI
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: REQUIRE_API_KEY
        value: "false"
      - key: JAVA_OPTS
        value: "-Xmx512m -XX:+UseG1GC"
      - key: RENDER
        value: "true"
      - key: DIRECT_URL_TIMEOUT_SECONDS
        value: "90"
      - key: SEARCH_TIMEOUT_SECONDS
        value: "120"
      - key: PREPARE_MAX_CONCURRENT
        value: "2"
      - key: YOUTUBE_COOKIES_BASE64
        sync: false
      - key: FACE_ENGINE
        value: opencv
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: REQUIRE_AUTH
        value: "false"
