# Render Blueprint — https://render.com/docs/blueprint-spec
# Set MONGODB_URI in the Render dashboard (MongoDB Atlas connection string).

services:
  - type: web
    name: newappmp3
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MONGODB_URI
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: REQUIRE_API_KEY
        value: "false"
      - key: JAVA_OPTS
        value: "-Xmx512m -XX:+UseG1GC"
      - key: YOUTUBE_COOKIES_BASE64
        sync: false
